<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Postal Realidad Aumentada - Café</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      /* Pantalla de inicio para activar el audio */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: sans-serif;
      }
      /* Botón moderno estilo cinematográfico */
      #startButton {
        padding: 20px 40px;
        font-size: 18px;
        font-weight: bold;
        color: #000;
        background: #deff9a;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        letter-spacing: 1px;
        box-shadow: 0 10px 20px rgba(222, 255, 154, 0.3);
        transition: transform 0.2s;
      }
      #startButton:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <button id="startButton">INICIAR EXPERIENCIA</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./marcador.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./video.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <a-asset-item id="modelo-grano" src="./grano.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        
        <a-video src="#vid" position="0 0 0" width="1" height="0.56"></a-video>

        <a-entity 
          gltf-model="#modelo-grano" 
          position="-0.7 0 0.1" 
          scale="0.2 0.2 0.2" 
          animation="property: position; to: -0.7 0.1 0.1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
          animation__rot="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
        </a-entity>

        <a-entity 
          gltf-model="#modelo-grano" 
          position="0.7 0 0.1" 
          scale="0.2 0.2 0.2" 
          animation="property: position; to: 0.7 -0.1 0.1; dir: alternate; dur: 2500; loop: true; easing: easeInOutSine"
          animation__rot="property: rotation; to: 360 360 0; loop: true; dur: 5500; easing: linear">
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#overlay');
      const startButton = document.querySelector('#startButton');
      const target = document.querySelector('#target');
      const vid = document.querySelector('#vid');

      // Acción al presionar el botón de inicio
      startButton.addEventListener('click', () => {
        overlay.style.display = 'none'; // Oculta la pantalla negra
        vid.muted = false; // Desbloquea el canal de audio para el navegador
        
        // Inicialización fantasma para forzar la activación de audio en iOS/Safari
        vid.play().then(() => {
          vid.pause();
        }).catch(err => console.log("Audio inicializado"));
      });

      // Reproducir cuando detecta la postal física
      target.addEventListener("targetFound", event => {
        vid.play();
      });

      // Pausar si se pierde de vista la postal
      target.addEventListener("targetLost", event => {
        vid.pause();
      });
    </script>
  </body>
</html>
